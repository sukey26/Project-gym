<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身房会员管理系统 - 登录</title>

</head>
<link rel="stylesheet" href="gym_login.css">

<body>
    <!-- 登录表单容器 -->
    <div class="login-container">
        <!-- 健身房标题区域 -->
        <div class="gym-logo">
            <h1>健身房会员登录</h1>
            <p>欢迎回来，请登录您的账号</p>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="login-form">
            <!-- 用户名输入框 -->
            <div class="form-group">
                <label for="username">用户名/会员卡号</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名或会员卡号">
                <div class="error-message" id="usernameError">用户名不能为空</div>
            </div>

            <!-- 密码输入框 -->
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入您的密码">
                <div class="error-message" id="passwordError">密码不能为空，且至少6位</div>
            </div>

            <!-- 记住密码和忘记密码 -->
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">记住我</label>
                </div>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" class="login-btn">登录系统</button>
        </form>

        <!-- 底部链接 -->
        <div class="form-footer">
            还没有账号？<a href="#">立即注册</a> | <a href="#">联系管理员</a>
        </div>
    </div>

    <script>
        // 获取表单元素
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');

        // 表单提交事件
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault(); // 阻止表单默认提交行为

            let isValid = true;

            // 验证用户名
            if (usernameInput.value.trim() === '') {
                usernameError.style.display = 'block';
                isValid = false;
            } else {
                usernameError.style.display = 'none';
            }

            // 验证密码
            if (passwordInput.value.trim() === '') {
                passwordError.textContent = '密码不能为空';
                passwordError.style.display = 'block';
                isValid = false;
            } else if (passwordInput.value.length < 6) {
                passwordError.textContent = '密码至少需要6位';
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordError.style.display = 'none';
            }

            // 表单验证通过，执行登录逻辑
            if (isValid) {
                // 这里可以替换为实际的登录请求
                alert(`登录成功！用户名：${usernameInput.value}`);

                // 模拟跳转到系统首页
                // window.location.href = 'dashboard.html';
            }
        });

        // 输入框聚焦时隐藏错误提示
        usernameInput.addEventListener('focus', function () {
            usernameError.style.display = 'none';
        });

        passwordInput.addEventListener('focus', function () {
            passwordError.style.display = 'none';
        });

        // 记住密码功能（本地存储示例）
        window.addEventListener('load', function () {
            const savedUsername = localStorage.getItem('gymUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                document.getElementById('remember').checked = true;
            }
        });

        // 监听记住密码复选框变化
        document.getElementById('remember').addEventListener('change', function () {
            if (this.checked && usernameInput.value.trim() !== '') {
                localStorage.setItem('gymUsername', usernameInput.value.trim());
            } else {
                localStorage.removeItem('gymUsername');
            }
        });
    </script>
</body>

</html>
