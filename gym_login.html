<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身房会员管理系统 - 登录</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* 页面背景 - 全屏背景图 */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            /* 设置全屏背景图 */
            background: url("./pic/3.jpg") no-repeat center center fixed;
            background-size: cover;
            /* 图片铺满整个屏幕 */
            position: relative;
        }

        /* 可选：添加半透明遮罩层，提升表单可读性 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            /* 黑色半透明遮罩，可调整透明度 */
            z-index: 1;
        }

        /* 登录卡片容器 - 悬浮在背景图上方 */
        .login-container {
            background-color: rgb(230, 229, 229);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            z-index: 2;
            /* 确保表单在遮罩层上方 */
        }

        /* 健身房logo/标题区域 */
        .gym-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .gym-logo h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .gym-logo p {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* 表单样式 */
        .login-form .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .login-form label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
        }

        .login-form input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .login-form input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        /* 错误提示 */
        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        /* 记住密码和忘记密码 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            color: #7f8c8d;
        }

        .remember-me input {
            margin-right: 8px;
            width: auto;
        }

        .forgot-password {
            color: #3498db;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-btn:hover {
            background-color: #2980b9;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        /* 底部链接 */
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-footer a {
            color: #3498db;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px 20px;
            }

            .gym-logo h1 {
                font-size: 24px;
            }
        }
    </style>
</head>


<body>
    <!-- 登录表单容器 -->
    <div class="login-container">
        <!-- 健身房标题区域 -->
        <div class="gym-logo">
            <h1>健身房会员登录</h1>
            <p>欢迎回来，请登录您的账号</p>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" class="login-form">
            <!-- 用户名输入框 -->
            <div class="form-group">
                <label for="username">用户名/会员卡号</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名或会员卡号">
                <div class="error-message" id="usernameError">用户名不能为空</div>
            </div>

            <!-- 密码输入框 -->
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入您的密码">
                <div class="error-message" id="passwordError">密码不能为空，且至少6位</div>
            </div>

            <!-- 记住密码和忘记密码 -->
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">记住我</label>
                </div>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>

            <!-- 登录按钮 -->
            <button type="submit" class="login-btn">登录系统</button>
        </form>

        <!-- 底部链接 -->
        <div class="form-footer">
            还没有账号？<a href="./gym_register.html" target="_blank">立即注册</a> | <a href="./gym_contact.html"
                target="_blank">联系管理员</a>
        </div>
    </div>

    <script>
        // 获取表单元素
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');

        // 表单提交事件
        loginForm.addEventListener('submit', function (e) {
            e.preventDefault(); // 阻止表单默认提交行为

            let isValid = true;

            // 验证用户名
            if (usernameInput.value.trim() === '') {
                usernameError.style.display = 'block';
                isValid = false;
            } else {
                usernameError.style.display = 'none';
            }

            // 验证密码
            if (passwordInput.value.trim() === '') {
                passwordError.textContent = '密码不能为空';
                passwordError.style.display = 'block';
                isValid = false;
            } else if (passwordInput.value.length < 6) {
                passwordError.textContent = '密码至少需要6位';
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordError.style.display = 'none';
            }

            // 表单验证通过，执行登录逻辑
            if (isValid) {
                alert(`登录成功！用户名：${usernameInput.value}`);

                // 跳转到系统首页
                // window.location.href = '#';
            }
        });

        // 输入框聚焦时隐藏错误提示
        usernameInput.addEventListener('focus', function () {
            usernameError.style.display = 'none';
        });

        passwordInput.addEventListener('focus', function () {
            passwordError.style.display = 'none';
        });

        // 记住密码功能（本地存储示例）
        window.addEventListener('load', function () {
            const savedUsername = localStorage.getItem('gymUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;  // 填写用户名
                document.getElementById('remember').checked = true; // 勾选“记住密码”
            }
        });

        // 监听记住密码复选框变化
        document.getElementById('remember').addEventListener('change', function () {
            if (this.checked && usernameInput.value.trim() !== '') {
                //保存用户名
                localStorage.setItem('gymUsername', usernameInput.value.trim());
            } else {
                //删除保存
                localStorage.removeItem('gymUsername');
            }
        });
    </script>
</body>

</html>
