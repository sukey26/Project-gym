<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系管理员 - 健身房会员管理系统</title>
  <style>
    /* 全局样式重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }

    /* 页面背景 - 复用登录页背景样式 */
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: url("../pic/3.jpg") no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    /* 背景半透明遮罩 */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    /* 联系管理员卡片容器 */
    .contact-container {
      background-color: rgb(230, 229, 229);
      border-radius: 15px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      position: relative;
      z-index: 2;
    }

    /* 标题区域样式 */
    .contact-logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .contact-logo h1 {
      color: #2c3e50;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .contact-logo p {
      color: #7f8c8d;
      font-size: 14px;
    }

    /* 联系方式展示区域 */
    .contact-info {
      background-color: #fff;
      border-radius: 10px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .contact-item {
      display: flex;
      flex-wrap: wrap;
      /* 适配小屏幕换行 */
      align-items: center;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .contact-item:last-child {
      margin-bottom: 0;
    }

    .item-label {
      color: #34495e;
      font-weight: 600;
      min-width: 100px;
      /* 固定标签宽度，对齐更整齐 */
    }

    .item-value {
      color: #2c3e50;
      flex: 1;
    }

    /* 底部链接样式 */
    .contact-footer {
      text-align: center;
      font-size: 14px;
    }

    .contact-footer a {
      color: #3498db;
      text-decoration: none;
      margin: 0 8px;
    }

    .contact-footer a:hover {
      text-decoration: underline;
    }

    /* 响应式适配 */
    @media (max-width: 768px) {
      .contact-container {
        padding: 30px 20px;
      }

      .contact-logo h1 {
        font-size: 24px;
      }

      .contact-item {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <!-- 联系管理员容器 -->
  <div class="contact-container">
    <!-- 标题区域 -->
    <div class="contact-logo">
      <h1>联系管理员</h1>
      <p>如有问题，请通过以下方式联系我们</p>
    </div>

    <!-- 联系方式展示区域 -->
    <div class="contact-info">
      <div class="contact-item">
        <span class="item-label">☎️ 联系电话：</span>
        <span class="item-value">888888888</span>
      </div>
      <div class="contact-item">
        <span class="item-label">📱 微信：</span>
        <span class="item-value">gym_admin888</span>
      </div>
      <div class="contact-item">
        <span class="item-label">📧 邮箱：</span>
        <span class="item-value">admin@gym-system.com</span>
      </div>
      <div class="contact-item">
        <span class="item-label">🕒 工作时间：</span>
        <span class="item-value">9:00-18:00（周一至周日）</span>
      </div>
    </div>

    <!-- 底部返回链接 -->
    <div class="contact-footer">
      <a href="./gym_login.html" target="_blank">返回登录</a> | <a href="./gym_register.html" target="_blank">前往注册</a>
    </div>
  </div>
</body>

</html>
